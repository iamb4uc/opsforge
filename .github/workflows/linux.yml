name: linux

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: shell validation
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: bash syntax
        shell: bash
        run: ./bin/test syntax

      - name: script help
        shell: bash
        run: ./bin/test help

      - name: wrapper targets
        shell: bash
        run: ./bin/test wrapper-targets

      - name: script catalog
        shell: bash
        run: ./bin/test script-catalog

      - name: forbidden language files
        shell: bash
        run: ./bin/test forbidden-files

      - name: readability
        shell: bash
        run: ./bin/test readability

      - name: output contract fixture
        shell: bash
        run: ./bin/test output-contract

      - name: fixture checks
        shell: bash
        run: ./bin/test linux-fixtures

      - name: shellcheck if available
        shell: bash
        run: ./bin/test shellcheck

      - name: runtime linux
        shell: bash
        run: ./bin/test runtime-linux

      - name: upload shell artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-shell-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore

      - name: upload runtime output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opsforge-linux-runtime-output
          path: output/
          if-no-files-found: error

  linux-feasibility:
    name: linux feasibility (${{ matrix.init }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - init: systemd
            image: ubuntu:24.04
          - init: runit
            image: ghcr.io/void-linux/void-glibc-full:latest
          - init: openrc
            image: alpine:3.20

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run read-only linux commands
        shell: bash
        run: |
          set -euo pipefail
          docker run -i --rm -v "$PWD:/repo" -w /repo "${{ matrix.image }}" /bin/sh -s <<'CONTAINER'
          set -eu

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update >/dev/null
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              bash ca-certificates coreutils findutils gawk grep gzip iproute2 \
              openssl procps sed tar util-linux \
              >/dev/null
          elif command -v xbps-install >/dev/null 2>&1; then
            xbps-install -Sy >/dev/null
            xbps-install -y \
              bash ca-certificates coreutils findutils gawk grep gzip iproute2 \
              openssl procps-ng runit sed tar util-linux \
              >/dev/null
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache \
              bash ca-certificates coreutils findutils gawk grep gzip iproute2 \
              openrc openssl procps sed tar util-linux \
              >/dev/null
          else
            echo "unsupported test image: no known package manager" >&2
            exit 1
          fi

          OPSFORGE_EXPECT_INIT="${{ matrix.init }}" \
            OPSFORGE_TEST_OUTPUT=/repo/.ci-artifacts \
            bash ./bin/test linux-feasibility
          CONTAINER

      - name: upload feasibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.init }}-feasibility-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore
