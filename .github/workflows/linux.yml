name: linux

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: shell validation
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: bash syntax
        shell: bash
        run: ./bin/test syntax

      - name: script help
        shell: bash
        run: ./bin/test help

      - name: fixture checks
        shell: bash
        run: ./bin/test linux-fixtures

      - name: shellcheck if available
        shell: bash
        run: ./bin/test shellcheck

      - name: upload shell artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-shell-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore

  linux-feasibility:
    name: linux feasibility
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run read-only linux commands
        shell: bash
        run: |
          set -euo pipefail
          docker run -i --rm -v "$PWD:/repo" -w /repo ubuntu:24.04 bash -s <<'CONTAINER'
          set -euo pipefail
          apt-get update >/dev/null
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bash ca-certificates coreutils findutils gawk grep gzip iproute2 openssl procps sed tar util-linux \
            >/dev/null
          OPSFORGE_TEST_OUTPUT=/repo/.ci-artifacts ./bin/test linux-feasibility
          CONTAINER

      - name: upload feasibility artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-feasibility-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore
