name: windows

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    name: powershell validation
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: parser check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path bin,lib,scripts -Recurse -File -Include *.ps1
          $failed = $false
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              foreach ($errorRecord in $errors) {
                $line = $errorRecord.Extent.StartLineNumber
                $column = $errorRecord.Extent.StartColumnNumber
                Write-Host ("{0}:{1}:{2}: {3}" -f $file.FullName, $line, $column, $errorRecord.Message)
                Write-Host ("::error file={0},line={1},col={2}::{3}" -f $file.FullName, $line, $column, $errorRecord.Message)
              }
            }
          }
          if ($failed) {
            throw "PowerShell parser validation failed"
          }

      - name: wrapper command map
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $wrapper = Get-Content -Raw -Path .\bin\opsforge.ps1
          $paths = [regex]::Matches($wrapper, "Join-Path \$Root '([^']+)'") | ForEach-Object { $_.Groups[1].Value }
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "wrapper references missing script: $path"
            }
          }

      - name: basic PowerShell help safety
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path .\scripts\windows -Recurse -File -Filter *.ps1
          foreach ($file in $files) {
            $content = Get-Content -Raw -Path $file.FullName
            if ($content -notmatch '\[CmdletBinding\(\)\]') {
              throw "missing CmdletBinding block: $($file.FullName)"
            }
            if ($content -notmatch '\[string\]\$OutputPath') {
              throw "missing OutputPath parameter: $($file.FullName)"
            }
            if ($content -notmatch '\[switch\]\$Quiet') {
              throw "missing Quiet parameter: $($file.FullName)"
            }
          }

      - name: command availability
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $commands = @(
            'Get-CimInstance',
            'Get-LocalUser',
            'Get-LocalGroupMember',
            'Get-Process',
            'Get-Service',
            'Get-ScheduledTask',
            'Get-ScheduledTaskInfo',
            'Get-NetTCPConnection',
            'Get-NetFirewallProfile',
            'Get-NetFirewallRule',
            'Get-NetFirewallPortFilter',
            'Get-NetFirewallAddressFilter',
            'Get-NetAdapter',
            'Get-NetRoute',
            'Get-DnsClientCache',
            'Get-WinEvent',
            'Get-EventLog',
            'Get-HotFix',
            'Get-AuthenticodeSignature',
            'Get-MpComputerStatus',
            'Get-MpPreference'
          )
          foreach ($command in $commands) {
            if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
              throw "missing expected Windows command: $command"
            }
          }

      - name: pester if available
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $tests = Get-ChildItem -Path .\tests\pester -Recurse -Filter *.Tests.ps1 -ErrorAction SilentlyContinue
          if (-not $tests) {
            Write-Host "No Pester tests found; skipping"
          } elseif (Get-Module -ListAvailable -Name Pester) {
            Invoke-Pester -Path .\tests\pester
          } else {
            Write-Host "Pester not installed on runner; skipping"
          }
