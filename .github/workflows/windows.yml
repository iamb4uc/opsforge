name: windows

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    name: powershell validation
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: parser check
        shell: pwsh
        run: .\bin\test.ps1 parser

      - name: wrapper command map
        shell: pwsh
        run: .\bin\test.ps1 wrapper-targets

      - name: basic PowerShell help safety
        shell: pwsh
        run: .\bin\test.ps1 static

      - name: command availability
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $commands = @(
            'Get-CimInstance',
            'Get-LocalUser',
            'Get-LocalGroupMember',
            'Get-Process',
            'Get-Service',
            'Get-ScheduledTask',
            'Get-ScheduledTaskInfo',
            'Get-NetTCPConnection',
            'Get-NetFirewallProfile',
            'Get-NetFirewallRule',
            'Get-NetFirewallPortFilter',
            'Get-NetFirewallAddressFilter',
            'Get-NetAdapter',
            'Get-NetRoute',
            'Get-DnsClientCache',
            'Get-WinEvent',
            'Get-EventLog',
            'Get-HotFix',
            'Get-AuthenticodeSignature',
            'Get-MpComputerStatus',
            'Get-MpPreference'
          )
          foreach ($command in $commands) {
            if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
              throw "missing expected Windows command: $command"
            }
          }

      - name: pester if available
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $tests = Get-ChildItem -Path .\tests\pester -Recurse -Filter *.Tests.ps1 -ErrorAction SilentlyContinue
          if (-not $tests) {
            Write-Host "No Pester tests found; skipping"
          } elseif (Get-Module -ListAvailable -Name Pester) {
            Invoke-Pester -Path .\tests\pester
          } else {
            Write-Host "Pester not installed on runner; skipping"
          }

      - name: safe runtime checks
        shell: pwsh
        run: .\bin\test.ps1 runtime

      - name: doctor
        shell: pwsh
        run: .\bin\opsforge.ps1 doctor

      - name: windows all
        shell: pwsh
        run: .\bin\opsforge.ps1 windows all -OutputPath .\output -Json -Markdown

      - name: upload windows artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-runtime-artifacts
          path: .ci-artifacts/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: upload runtime output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opsforge-windows-runtime-output
          path: output/
          if-no-files-found: error
